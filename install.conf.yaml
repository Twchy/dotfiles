- defaults:
    link:
      create: true

- clean: ['~', '~/.config']

- link:
    ~/.zshrc: ~/personal/dotfiles/zshrc/.zshrc
    ~/.config/nvim: ~/personal/dotfiles/neovim
    ~/.tmux.conf: ~/personal/dotfiles/tmux/.tmux.conf

- create:
    - ~/.config
    - ~/.scripts
    - ~/.ssh

- shell:
    - curl -sS https://starship.rs/install.sh | sh -s -- --yes
    - echo "Dotfiles setup complete!"
